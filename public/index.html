<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thoughts — Idea Graph</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="graph"></div>

  <div id="panel">
    <h1>🧠 Thoughts</h1>
    <div id="stats">loading…</div>
    <input id="search" type="text" placeholder="search ideas…" autocomplete="off" />
    <div id="legend"></div>
    <div class="hint">scroll to zoom · drag to pan · click a node</div>
  </div>

  <div id="tooltip" class="hidden"></div>

  <!-- graphology (Graph model) + layout library + Sigma (WebGL renderer) -->
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/graphology-library@0.7.2/dist/graphology-library.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/dist/sigma.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
