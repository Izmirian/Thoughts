name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres WITH pgvector — exercises the real ANN / vector path in db.test.js,
    # not just the local SQLite (cosine-in-JS) fallback.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: thoughts
          POSTGRES_PASSWORD: thoughts
          POSTGRES_DB: thoughts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests against Postgres + pgvector
        env:
          DATABASE_URL: postgresql://thoughts:thoughts@localhost:5432/thoughts_test
        run: npm test
